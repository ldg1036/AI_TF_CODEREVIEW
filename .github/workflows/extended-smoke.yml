name: extended-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  extended-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Python dependency
        run: python -m pip install --upgrade pip openpyxl
      - name: Install Node dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium
      - name: Run local extended gate
        run: python tools/run_local_extended_gate.py
      - name: Upload extended artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extended-smoke-artifacts
          path: |
            CodeReview_Report/release_gate_*.json
            CodeReview_Report/release_gate_*.md
            tools/benchmark_results/*.json
            tools/integration_results/*.json
